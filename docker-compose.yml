services:
  facebook-monitor:
    build: .
    container_name: facebook-monitor
    restart: unless-stopped
    ports:
      - "5000:5000"
    # Secrets and Facebook IDs come only from `env_file` so an empty `${VAR:-}`
    # in this block cannot override your `.env` (Compose merges `environment` on top).
    environment:
      SMTP_SERVER: ${SMTP_SERVER:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-3-5-sonnet-20241022}
      GRAPH_API_VERSION: ${GRAPH_API_VERSION:-v21.0}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/facebook_monitor.db}
      TIMEZONE: ${TIMEZONE:-UTC}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REPORT_CRON: ${REPORT_CRON:-0 7 * * *}
      SYNC_CRON: ${SYNC_CRON:-15 */6 * * *}
      ENABLE_SCHEDULER: ${ENABLE_SCHEDULER:-true}
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      # Playwright browser-search HTML (POST /admin/report-browser-html reads report/search_*/index.html)
      - ./report:/app/report
      - ./logs:/app/logs
      # Optional: re-read FACEBOOK_GROUP_IDS / tokens on admin & scheduler without full recreate
      - ./.env:/app/.env:ro
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app_net:
    driver: bridge
